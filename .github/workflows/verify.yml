name: Verify Next.js Build

on:
  push:
    branches:
      - MSC-Website-v7
      - main

jobs:
  verify:
    name: verify:next:safe + smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare build env
        run: Copy-Item .env.example .env.local
        shell: pwsh

      - name: Verify production build
        run: npm run verify:next:safe

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run Playwright smoke tests
        shell: pwsh
        run: |
          # Start dev server in background
          npm run dev -- -p 3000 &
          # Wait for homepage, then Payload admin login (client-rendered; slow first compile)
          npx wait-on http://127.0.0.1:3000 --timeout 180000
          node scripts/wait-for-dev-admin.mjs
          # Run smoke tests
          npm run test:smoke
          $exitCode = $LASTEXITCODE
          # Kill dev server
          npm run msc:kill-dev-port
          exit $exitCode
