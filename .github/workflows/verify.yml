name: Verify Next.js Build

on:
  push:
    branches:
      - MSC-Website-v7
      - main

jobs:
  verify:
    name: verify:next:safe + smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare build env
        run: Copy-Item .env.example .env.local
        shell: pwsh

      - name: Verify production build
        run: npm run verify:next:safe

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run Playwright smoke tests
        run: |
          Start-Process -NoNewWindow -WorkingDirectory $PWD -FilePath "npx" -ArgumentList "next","dev","-p","3000"
          npx wait-on http://localhost:3000 --timeout 120000
          npm run test:smoke
        shell: pwsh
